<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donare de Sânge - Autentificare</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-icon">🩸</span>
                <h1>Donare de Sânge</h1>
                <p class="subtitle">Fiecare picătură contează</p>
            </div>

            <form id="loginForm" class="auth-form">
                <h2>Autentificare</h2>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="exemplu@email.com"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Parolă</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Introduceți parola"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn btn-primary">Intră în cont</button>
                
                <div class="form-footer">
                    <p>Nu ai cont? <a href="register.html">Înregistrează-te</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
